services:
  postgres:
    image: postgres:16-alpine
    container_name: adesso_event_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: adesso
      POSTGRES_PASSWORD: adesso_secret
      POSTGRES_DB: eventapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adesso_event_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: adesso_event_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: adesso_minio
      MINIO_ROOT_PASSWORD: adesso_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
